name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Download and setup Gradle
        run: |
          cd /tmp
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          export PATH=/tmp/gradle-8.4/bin:$PATH
          gradle --version

      - name: Build APK
        run: |
          export PATH=/tmp/gradle-8.4/bin:$PATH
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleRelease --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: english-adventure-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
