name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Fix gradlew line endings
        run: |
          if [ -f gradlew ]; then
            sed -i 's/\r$//' gradlew
            sed -i 's/\r$//' gradlew.bat
          fi

      - name: Create gradle wrapper properties
        run: |
          mkdir -p gradle/wrapper
          echo 'distributionBase=GRADLE_USER_HOME
  distributionPath=wrapper/dists
  distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
  zipStoreBase=GRADLE_USER_HOME
  zipStorePath=wrapper/dists' > gradle/wrapper/gradle-wrapper.properties

      - name: Download gradle wrapper jar
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: english-adventure-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
